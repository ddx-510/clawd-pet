<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <defs>
    <style>
      @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
      @keyframes blink { 0%,42%,46%,100%{height:14px} 44%{height:3px} }
      @keyframes sparkle1 { 0%,100%{opacity:0.3} 50%{opacity:0.9} }
      @keyframes sparkle2 { 0%,100%{opacity:0.7} 50%{opacity:0.2} }
      @keyframes zzz1 { 0%,100%{opacity:0.6;transform:translate(0,0)} 50%{opacity:0.3;transform:translate(2px,-4px)} }
      @keyframes zzz2 { 0%,100%{opacity:0.4;transform:translate(0,0)} 50%{opacity:0.2;transform:translate(3px,-5px)} }
      @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-3px)} 75%{transform:translateX(3px)} }
      @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
      @keyframes alertJump { 0%,100%{transform:translateY(0)} 40%{transform:translateY(-8px)} }
      .title { font-family: 'SF Mono','Courier New',monospace; font-weight: bold; fill: #e8e0d8; }
      .subtitle { font-family: 'SF Mono','Courier New',monospace; fill: #9a958f; }
      .badge { font-family: 'SF Mono','Courier New',monospace; font-size: 10px; fill: #1E1E2E; font-weight: bold; }
      .label { font-family: 'SF Mono','Courier New',monospace; font-size: 8px; fill: #9a958f; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#1E1E2E" rx="16"/>

  <!-- Grid -->
  <g opacity="0.03">
    <line x1="0" y1="40" x2="800" y2="40" stroke="#fff"/><line x1="0" y1="80" x2="800" y2="80" stroke="#fff"/>
    <line x1="0" y1="120" x2="800" y2="120" stroke="#fff"/><line x1="0" y1="160" x2="800" y2="160" stroke="#fff"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#fff"/><line x1="0" y1="240" x2="800" y2="240" stroke="#fff"/>
    <line x1="0" y1="280" x2="800" y2="280" stroke="#fff"/><line x1="0" y1="320" x2="800" y2="320" stroke="#fff"/>
    <line x1="0" y1="360" x2="800" y2="360" stroke="#fff"/>
  </g>

  <!-- ===== MAIN CLAWD (center, floating) ===== -->
  <g transform="translate(320, 55)" style="animation:float 3s ease-in-out infinite">
    <rect x="28" y="14" width="98" height="10" fill="#C4876A"/>
    <rect x="18" y="24" width="118" height="10" fill="#C4876A"/>
    <rect x="18" y="34" width="118" height="10" fill="#C4876A"/>
    <rect x="18" y="44" width="118" height="10" fill="#C4876A"/>
    <rect x="18" y="54" width="118" height="10" fill="#C4876A"/>
    <rect x="18" y="64" width="118" height="10" fill="#C4876A"/>
    <rect x="28" y="74" width="98" height="10" fill="#C4876A"/>
    <rect x="0" y="34" width="18" height="10" fill="#C4876A"/>
    <rect x="0" y="44" width="18" height="10" fill="#C4876A"/>
    <rect x="136" y="34" width="18" height="10" fill="#C4876A"/>
    <rect x="136" y="44" width="18" height="10" fill="#C4876A"/>
    <rect x="48" y="44" width="10" height="14" fill="#3B2318" style="animation:blink 4s ease-in-out infinite"/>
    <rect x="96" y="44" width="10" height="14" fill="#3B2318" style="animation:blink 4s ease-in-out infinite;animation-delay:0.1s"/>
    <rect x="28" y="84" width="10" height="18" fill="#7B5040"/>
    <rect x="48" y="84" width="10" height="24" fill="#7B5040"/>
    <rect x="96" y="84" width="10" height="24" fill="#7B5040"/>
    <rect x="116" y="84" width="10" height="18" fill="#7B5040"/>
  </g>

  <!-- Sparkles around main -->
  <rect x="295" y="65" width="6" height="6" fill="#FFD93D" style="animation:sparkle1 2s ease-in-out infinite"/>
  <rect x="505" y="58" width="5" height="5" fill="#FF8C94" style="animation:sparkle2 2.5s ease-in-out infinite"/>

  <!-- ===== ERROR CLAWD (left) ===== -->
  <g transform="translate(50, 115)" style="animation:shake 0.3s ease-in-out infinite">
    <rect x="10" y="5" width="36" height="4" fill="#C4876A"/>
    <rect x="6" y="9" width="44" height="4" fill="#C4876A"/>
    <rect x="6" y="13" width="44" height="4" fill="#C4876A"/>
    <rect x="6" y="17" width="44" height="4" fill="#C4876A"/>
    <rect x="10" y="21" width="36" height="4" fill="#C4876A"/>
    <rect x="2" y="11" width="4" height="6" fill="#C4876A"/>
    <rect x="50" y="11" width="4" height="6" fill="#C4876A"/>
    <rect x="16" y="15" width="4" height="2" fill="#3B2318"/>
    <rect x="36" y="15" width="4" height="2" fill="#3B2318"/>
    <rect x="10" y="25" width="4" height="6" fill="#7B5040"/>
    <rect x="20" y="25" width="4" height="7" fill="#7B5040"/>
    <rect x="32" y="25" width="4" height="7" fill="#7B5040"/>
    <rect x="42" y="25" width="4" height="6" fill="#7B5040"/>
    <!-- Smoke -->
    <rect x="8" y="0" width="4" height="4" fill="#888" opacity="0.4"/>
    <rect x="42" y="-2" width="4" height="4" fill="#888" opacity="0.3"/>
    <text x="28" y="-2" text-anchor="middle" font-family="'Courier New'" font-size="6" fill="#D9534F" font-weight="bold">ERROR</text>
  </g>
  <text x="78" y="160" text-anchor="middle" class="label">error</text>

  <!-- ===== ALERT CLAWD ===== -->
  <g transform="translate(160, 115)" style="animation:alertJump 0.5s ease-in-out infinite">
    <rect x="10" y="5" width="36" height="4" fill="#C4876A"/>
    <rect x="6" y="9" width="44" height="4" fill="#C4876A"/>
    <rect x="6" y="13" width="44" height="4" fill="#C4876A"/>
    <rect x="6" y="17" width="44" height="4" fill="#C4876A"/>
    <rect x="10" y="21" width="36" height="4" fill="#C4876A"/>
    <rect x="2" y="11" width="4" height="6" fill="#C4876A"/>
    <rect x="50" y="11" width="4" height="6" fill="#C4876A"/>
    <rect x="16" y="13" width="4" height="4" fill="#3B2318"/>
    <rect x="36" y="13" width="4" height="4" fill="#3B2318"/>
    <rect x="10" y="25" width="4" height="6" fill="#7B5040"/>
    <rect x="42" y="25" width="4" height="6" fill="#7B5040"/>
    <!-- ! mark -->
    <rect x="25" y="-6" width="6" height="8" fill="#F0AD4E" rx="1"/>
    <rect x="25" y="4" width="6" height="4" fill="#F0AD4E" rx="1"/>
  </g>
  <text x="188" y="160" text-anchor="middle" class="label">alert</text>

  <!-- ===== SLEEPING CLAWD (right) ===== -->
  <g transform="translate(640, 115)">
    <rect x="10" y="5" width="36" height="4" fill="#C4876A"/>
    <rect x="6" y="9" width="44" height="4" fill="#C4876A"/>
    <rect x="6" y="13" width="44" height="4" fill="#C4876A"/>
    <rect x="6" y="17" width="44" height="4" fill="#C4876A"/>
    <rect x="10" y="21" width="36" height="4" fill="#C4876A"/>
    <rect x="2" y="11" width="4" height="6" fill="#C4876A"/>
    <rect x="50" y="11" width="4" height="6" fill="#C4876A"/>
    <rect x="16" y="15" width="4" height="2" fill="#3B2318"/>
    <rect x="36" y="15" width="4" height="2" fill="#3B2318"/>
    <rect x="14" y="25" width="4" height="6" fill="#7B5040"/>
    <rect x="38" y="25" width="4" height="6" fill="#7B5040"/>
    <text x="50" y="4" font-family="'Courier New'" font-size="10" font-weight="bold" fill="#C4876A" opacity="0.6" style="animation:zzz1 2.5s ease-in-out infinite">z</text>
    <text x="56" y="-4" font-family="'Courier New'" font-size="7" font-weight="bold" fill="#C4876A" opacity="0.4" style="animation:zzz2 2.5s ease-in-out infinite;animation-delay:0.5s">z</text>
  </g>
  <text x="668" y="160" text-anchor="middle" class="label">sleeping</text>

  <!-- ===== FRIENDS (sub-agents) ===== -->
  <g transform="translate(540, 120)" style="animation:bob 1.8s ease-in-out infinite">
    <rect x="6" y="4" width="16" height="3" fill="#7EB8DA"/>
    <rect x="3" y="7" width="22" height="3" fill="#7EB8DA"/>
    <rect x="3" y="10" width="22" height="3" fill="#7EB8DA"/>
    <rect x="6" y="13" width="16" height="3" fill="#7EB8DA"/>
    <rect x="8" y="10" width="3" height="3" fill="#2D1B14"/>
    <rect x="17" y="10" width="3" height="3" fill="#2D1B14"/>
  </g>
  <g transform="translate(570, 118)" style="animation:bob 1.8s ease-in-out infinite;animation-delay:0.3s">
    <rect x="6" y="4" width="16" height="3" fill="#A8D5A2"/>
    <rect x="3" y="7" width="22" height="3" fill="#A8D5A2"/>
    <rect x="3" y="10" width="22" height="3" fill="#A8D5A2"/>
    <rect x="6" y="13" width="16" height="3" fill="#A8D5A2"/>
    <rect x="8" y="10" width="3" height="3" fill="#2D1B14"/>
    <rect x="17" y="10" width="3" height="3" fill="#2D1B14"/>
  </g>
  <text x="564" y="160" text-anchor="middle" class="label">friends</text>

  <!-- ===== TEXT ===== -->
  <text x="400" y="218" text-anchor="middle" class="title" font-size="48">Clawd</text>
  <text x="400" y="248" text-anchor="middle" class="subtitle" font-size="15">A pixel art desktop pet for Claude Code</text>

  <!-- State badges - two rows -->
  <g transform="translate(115, 272)">
    <rect x="0" y="0" width="75" height="22" fill="#C4876A" rx="11"/><text x="37" y="15" text-anchor="middle" class="badge">thinking</text>
  </g>
  <g transform="translate(200, 272)">
    <rect x="0" y="0" width="65" height="22" fill="#FFD93D" rx="11"/><text x="32" y="15" text-anchor="middle" class="badge">typing</text>
  </g>
  <g transform="translate(275, 272)">
    <rect x="0" y="0" width="72" height="22" fill="#A8D5A2" rx="11"/><text x="36" y="15" text-anchor="middle" class="badge">building</text>
  </g>
  <g transform="translate(357, 272)">
    <rect x="0" y="0" width="75" height="22" fill="#7EB8DA" rx="11"/><text x="37" y="15" text-anchor="middle" class="badge">planning</text>
  </g>
  <g transform="translate(442, 272)">
    <rect x="0" y="0" width="70" height="22" fill="#DDA0DD" rx="11"/><text x="35" y="15" text-anchor="middle" class="badge">juggling</text>
  </g>
  <g transform="translate(522, 272)">
    <rect x="0" y="0" width="80" height="22" fill="#DDA0DD" rx="11"/><text x="40" y="15" text-anchor="middle" class="badge">conducting</text>
  </g>
  <!-- Row 2 -->
  <g transform="translate(160, 302)">
    <rect x="0" y="0" width="60" height="22" fill="#D9534F" rx="11"/><text x="30" y="15" text-anchor="middle" class="badge" style="fill:#fff">error</text>
  </g>
  <g transform="translate(230, 302)">
    <rect x="0" y="0" width="55" height="22" fill="#F0AD4E" rx="11"/><text x="27" y="15" text-anchor="middle" class="badge">alert</text>
  </g>
  <g transform="translate(295, 302)">
    <rect x="0" y="0" width="75" height="22" fill="#8B6D50" rx="11"/><text x="37" y="15" text-anchor="middle" class="badge" style="fill:#fff">sweeping</text>
  </g>
  <g transform="translate(380, 302)">
    <rect x="0" y="0" width="75" height="22" fill="#D4A76A" rx="11"/><text x="37" y="15" text-anchor="middle" class="badge">carrying</text>
  </g>
  <g transform="translate(465, 302)">
    <rect x="0" y="0" width="65" height="22" fill="#FFD93D" rx="11"/><text x="32" y="15" text-anchor="middle" class="badge">dancing</text>
  </g>
  <g transform="translate(540, 302)">
    <rect x="0" y="0" width="55" height="22" fill="#5CB85C" rx="11"/><text x="27" y="15" text-anchor="middle" class="badge">done</text>
  </g>

  <!-- Install command -->
  <rect x="240" y="345" width="320" height="36" fill="#2D2D3D" rx="8" stroke="#3D3D4D" stroke-width="1"/>
  <text x="260" y="368" font-family="'SF Mono','Courier New',monospace" font-size="14" fill="#5CB85C">$</text>
  <text x="280" y="368" font-family="'SF Mono','Courier New',monospace" font-size="14" fill="#e8e0d8">npm install -g clawd-pet</text>
</svg>
