<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Clawd Pet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      user-select: none;
    }
    #pet-container {
      width: 300px;
      height: 360px;
      position: relative;
      -webkit-app-region: no-drag;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      pointer-events: none;
    }
    #pet-svg {
      flex-shrink: 0;
      -webkit-app-region: drag;
      pointer-events: auto;
    }
    #bubble-wrap {
      display: none;
      position: absolute;
      bottom: 155px;
      left: 10px;
      right: 10px;
      -webkit-app-region: no-drag;
      pointer-events: auto;
    }
    #bubble-wrap.visible { display: block; animation: bubble-in 0.3s ease-out; }
    #bubble-close {
      position: absolute;
      top: 4px;
      right: 6px;
      width: 16px;
      height: 16px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.5);
      font-size: 10px;
      line-height: 16px;
      text-align: center;
      border-radius: 50%;
      cursor: pointer;
      z-index: 1;
      padding: 0;
    }
    #bubble-close:hover { background: rgba(255,255,255,0.2); color: #fff; }
    #speech-bubble {
      max-height: 160px;
      overflow-y: auto;
      background: rgba(20, 20, 30, 0.85);
      color: #e8e0d8;
      font-family: 'SF Mono', 'Menlo', 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.5;
      padding: 10px 24px 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(196, 135, 106, 0.3);
      backdrop-filter: blur(8px);
      word-wrap: break-word;
      scrollbar-width: thin;
      scrollbar-color: rgba(196,135,106,0.3) transparent;
    }
    #bubble-wrap::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 8px solid rgba(20, 20, 30, 0.85);
    }
    #speech-bubble::-webkit-scrollbar { width: 4px; }
    #speech-bubble::-webkit-scrollbar-thumb { background: rgba(196,135,106,0.3); border-radius: 2px; }
    #speech-bubble.visible { display: block; animation: bubble-in 0.3s ease-out; }
    #speech-bubble p { margin: 0 0 6px 0; }
    #speech-bubble p:last-child { margin: 0; }
    #speech-bubble code { background: rgba(255,255,255,0.1); padding: 1px 4px; border-radius: 3px; font-size: 10px; }
    #speech-bubble pre { background: rgba(0,0,0,0.4); padding: 6px 8px; border-radius: 6px; overflow-x: auto; margin: 4px 0; }
    #speech-bubble pre code { background: none; padding: 0; font-size: 10px; }
    #speech-bubble strong { color: #C4876A; }
    #speech-bubble ul, #speech-bubble ol { padding-left: 16px; margin: 4px 0; }
    #speech-bubble li { margin: 2px 0; }
    #speech-bubble h1, #speech-bubble h2, #speech-bubble h3 { font-size: 12px; color: #C4876A; margin: 6px 0 3px 0; }
    #speech-bubble a { color: #7EB8DA; }
    #speech-bubble .cursor { display: inline-block; width: 6px; height: 12px; background: #C4876A; animation: blink-cursor 0.8s infinite; vertical-align: text-bottom; margin-left: 2px; }
    @keyframes blink-cursor { 0%,50% { opacity: 1; } 51%,100% { opacity: 0; } }
    #status-bar {
      position: absolute;
      bottom: 2px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'SF Mono', 'Courier New', monospace;
      font-size: 8px;
      color: rgba(255,255,255,0.7);
      background: rgba(0,0,0,0.55);
      padding: 3px 10px;
      border-radius: 10px;
      white-space: nowrap;
      -webkit-app-region: no-drag;
      pointer-events: none;
      backdrop-filter: blur(4px);
    }
    #food-bar {
      display: flex;
      gap: 1px;
      align-items: center;
    }
    #food-bar .food-pip {
      width: 4px;
      height: 8px;
      border-radius: 1px;
      background: #5CB85C;
      transition: background 0.3s, opacity 0.3s;
    }
    #food-bar .food-pip.low { background: #F0AD4E; }
    #food-bar .food-pip.critical { background: #D9534F; }
    #food-bar .food-pip.empty { background: rgba(255,255,255,0.1); }
    #rename-overlay {
      display: none;
      position: absolute;
      bottom: 155px;
      left: 10px;
      right: 10px;
      background: rgba(20, 20, 30, 0.9);
      border: 1px solid rgba(196, 135, 106, 0.4);
      border-radius: 10px;
      padding: 10px;
      -webkit-app-region: no-drag;
      pointer-events: auto;
      backdrop-filter: blur(8px);
    }
    #rename-overlay.visible { display: block; animation: bubble-in 0.2s ease-out; }
    #rename-input {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(196, 135, 106, 0.3);
      border-radius: 6px;
      color: #e8e0d8;
      font-family: 'SF Mono', 'Courier New', monospace;
      font-size: 12px;
      padding: 6px 8px;
      outline: none;
    }
    #rename-input::placeholder { color: rgba(255,255,255,0.3); }
    #rename-input:focus { border-color: #C4876A; }
    .sub-agent {
      position: absolute;
      transition: all 0.3s ease;
      pointer-events: none;
    }
    @keyframes float-in {
      0% { opacity: 0; transform: scale(0.3) translateY(20px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes bubble-in {
      0% { opacity: 0; transform: scale(0.8) translateY(10px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
  </style>
</head>
<body>
  <div id="pet-container">
    <!--
      CLAWD - pixel crab mascot
      Orange body, two claws raised, 4 legs, tiny dark eyes
      P=6 pixel size, viewBox 140x140
    -->
    <svg id="pet-svg" width="140" height="140" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg"
         shape-rendering="crispEdges">
      <defs>
        <style>
          @keyframes breathe {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-1.5px); }
          }
          @keyframes bounce {
            0%   { transform: translateY(0) rotate(0deg); }
            20%  { transform: translateY(-10px) rotate(-7deg); }
            40%  { transform: translateY(0) rotate(0deg); }
            60%  { transform: translateY(-7px) rotate(7deg); }
            80%  { transform: translateY(0) rotate(0deg); }
          }
          @keyframes think-bob {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            30% { transform: translateY(-3px) rotate(-3deg); }
            70% { transform: translateY(-3px) rotate(3deg); }
          }
          @keyframes compose-nod {
            0%, 100% { transform: translateY(0); }
            30% { transform: translateY(-2px); }
            70% { transform: translateY(1px); }
          }
          @keyframes plan-look {
            0%, 100% { transform: translateX(0); }
            30% { transform: translateX(-4px); }
            70% { transform: translateX(4px); }
          }
          @keyframes sway {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
          }
          @keyframes carried {
            0%, 100% { transform: rotate(-5deg) scaleY(1.05) scaleX(0.96); }
            50% { transform: rotate(5deg) scaleY(1.05) scaleX(0.96); }
          }
          @keyframes squish-land {
            0%   { transform: scaleY(1.2) scaleX(0.85) translateY(-6px); }
            40%  { transform: scaleY(0.8) scaleX(1.15) translateY(2px); }
            70%  { transform: scaleY(1.04) scaleX(0.97) translateY(-1px); }
            100% { transform: scaleY(1) scaleX(1) translateY(0); }
          }

          #pet-body.idle      { animation: breathe 3s ease-in-out infinite; }
          #pet-body.dancing    { animation: bounce 0.45s ease-in-out infinite; }
          #pet-body.thinking   { animation: think-bob 2.5s ease-in-out infinite; }
          #pet-body.composing  { animation: compose-nod 1.8s ease-in-out infinite; }
          #pet-body.planning   { animation: plan-look 3s ease-in-out infinite; }
          #pet-body.subagents  { animation: sway 2s ease-in-out infinite; }
          #pet-body.dragging   { animation: carried 0.6s ease-in-out infinite; }
          #pet-body.dropped    { animation: squish-land 0.4s ease-out forwards; }
        </style>
      </defs>

      <!--
        P=7. Clawd blob centered in 140x140
        Body 11px wide (77u), 7px tall (49u)
        Color: #C4876A  Legs: #7B5040
      -->

      <g id="pet-body" class="idle">

        <!-- BODY -->
        <rect x="39" y="24" width="63" height="7" fill="#C4876A"/>
        <rect x="32" y="31" width="77" height="7" fill="#C4876A"/>
        <rect x="32" y="38" width="77" height="7" fill="#C4876A"/>
        <rect x="32" y="45" width="77" height="7" fill="#C4876A"/>
        <rect x="32" y="52" width="77" height="7" fill="#C4876A"/>
        <rect x="32" y="59" width="77" height="7" fill="#C4876A"/>
        <rect x="39" y="66" width="63" height="7" fill="#C4876A"/>

        <!-- SIDE NUBS -->
        <rect x="18" y="38" width="14" height="7" fill="#C4876A"/>
        <rect x="18" y="45" width="14" height="7" fill="#C4876A"/>
        <rect x="109" y="38" width="14" height="7" fill="#C4876A"/>
        <rect x="109" y="45" width="14" height="7" fill="#C4876A"/>

        <!-- EYES: tiny 1x1 -->
        <rect id="eye-left"  x="53" y="42" width="7" height="7" fill="#3B2318"/>
        <rect id="eye-right" x="81" y="42" width="7" height="7" fill="#3B2318"/>

        <!-- 4 LEGS -->
        <g id="legs">
          <rect class="leg" x="39"  y="73" width="7" height="14" fill="#7B5040"/>
          <rect class="leg" x="55"  y="73" width="7" height="18" fill="#7B5040"/>
          <rect class="leg" x="79"  y="73" width="7" height="18" fill="#7B5040"/>
          <rect class="leg" x="95"  y="73" width="7" height="14" fill="#7B5040"/>
        </g>
      </g>

      <!-- ====== ACCESSORIES ====== -->

      <!-- Think bubbles -->
      <g id="think-bubbles" style="display:none;">
        <rect x="115" y="22" width="6" height="6" fill="#C4876A" opacity="0.4"/>
        <rect x="121" y="12" width="12" height="12" fill="#C4876A" opacity="0.55"/>
        <rect x="124" y="15" width="3" height="3" fill="#fff" opacity="0.6"/>
        <rect x="127" y="15" width="3" height="3" fill="#fff" opacity="0.6"/>
        <rect x="127" y="18" width="3" height="3" fill="#fff" opacity="0.6"/>
        <rect x="124" y="20" width="3" height="3" fill="#fff" opacity="0.6"/>
      </g>

      <!-- Planning clipboard -->
      <g id="plan-clipboard" style="display:none;">
        <rect x="2" y="36" width="18" height="28" fill="#FFF5EB"/>
        <rect x="2" y="36" width="18" height="28" fill="none" stroke="#A06840" stroke-width="1.5"/>
        <rect x="7" y="33" width="8" height="6" fill="#A06840"/>
        <rect x="5" y="44" width="12" height="2" fill="#C4876A" opacity="0.4"/>
        <rect x="5" y="49" width="9"  height="2" fill="#C4876A" opacity="0.4"/>
        <rect x="5" y="54" width="11" height="2" fill="#C4876A" opacity="0.4"/>
      </g>

      <!-- Composing pencil -->
      <g id="compose-pencil" style="display:none;" transform="rotate(-25 132 58)">
        <rect x="128" y="44" width="6" height="20" fill="#FFD93D"/>
        <rect x="128" y="64" width="6" height="4" fill="#FFB6C1"/>
        <rect x="128" y="40" width="6" height="5" fill="#4A4A4A"/>
      </g>

      <!-- Dance sparkles -->
      <g id="dance-sparkles" style="display:none;">
        <g class="sparkle"><rect x="6" y="18" width="6" height="6" fill="#FFD93D"/></g>
        <g class="sparkle"><rect x="128" y="14" width="6" height="6" fill="#FF8C94"/></g>
        <g class="sparkle"><rect x="4" y="82" width="6" height="6" fill="#FFD93D" opacity="0.7"/></g>
        <g class="sparkle"><rect x="130" y="78" width="6" height="6" fill="#FF8C94" opacity="0.7"/></g>
        <g class="sparkle">
          <rect x="10" y="52" width="3" height="10" fill="#FFD93D" opacity="0.8"/>
          <rect x="7" y="52" width="6" height="3" fill="#FFD93D" opacity="0.8"/>
        </g>
        <g class="sparkle">
          <rect x="128" y="48" width="3" height="10" fill="#FF8C94" opacity="0.8"/>
          <rect x="125" y="48" width="6" height="3" fill="#FF8C94" opacity="0.8"/>
        </g>
      </g>

      <!-- Drag effects - motion lines only -->
      <g id="drag-effects" style="display:none;">
        <rect class="drag-line" x="6" y="38" width="10" height="2" fill="#C4876A" opacity="0.3" rx="1"/>
        <rect class="drag-line" x="4" y="48" width="12" height="2" fill="#C4876A" opacity="0.25" rx="1"/>
        <rect class="drag-line" x="8" y="58" width="8" height="2" fill="#C4876A" opacity="0.2" rx="1"/>
        <rect class="drag-line" x="124" y="38" width="10" height="2" fill="#C4876A" opacity="0.3" rx="1"/>
        <rect class="drag-line" x="122" y="48" width="12" height="2" fill="#C4876A" opacity="0.25" rx="1"/>
        <rect class="drag-line" x="126" y="58" width="8" height="2" fill="#C4876A" opacity="0.2" rx="1"/>
      </g>

      <!-- Drop poof -->
      <g id="drop-effects" style="display:none;">
        <rect x="20" y="86" width="12" height="6" fill="#E8D8C8" opacity="0.5"/>
        <rect x="64" y="88" width="12" height="6" fill="#E8D8C8" opacity="0.4"/>
        <rect x="108" y="86" width="12" height="6" fill="#E8D8C8" opacity="0.5"/>
      </g>

      <!-- Zzz sleep -->
      <g id="zzz-effects" style="display:none;">
        <text class="zzz-letter" x="104" y="24" font-family="'Courier New'" font-size="13" font-weight="bold" fill="#C4876A" opacity="0.7">z</text>
        <text class="zzz-letter" x="114" y="14" font-family="'Courier New'" font-size="10" font-weight="bold" fill="#C4876A" opacity="0.5">z</text>
        <text class="zzz-letter" x="122" y="6" font-family="'Courier New'" font-size="7" font-weight="bold" fill="#C4876A" opacity="0.35">z</text>
      </g>

      <!-- Done celebration -->
      <g id="done-effects" style="display:none;">
        <!-- Pixel sparkle stars around the pet -->
        <g class="done-star"><rect x="16" y="18" width="5" height="5" fill="#FFD93D"/></g>
        <g class="done-star"><rect x="120" y="14" width="5" height="5" fill="#FFD93D"/></g>
        <g class="done-star"><rect x="8" y="52" width="4" height="4" fill="#FFD93D" opacity="0.8"/></g>
        <g class="done-star"><rect x="128" y="48" width="4" height="4" fill="#FFD93D" opacity="0.8"/></g>
        <!-- Pixel checkmark -->
        <g id="done-check">
          <rect x="118" y="22" width="4" height="4" fill="#5CB85C"/>
          <rect x="114" y="26" width="4" height="4" fill="#5CB85C"/>
          <rect x="122" y="18" width="4" height="4" fill="#5CB85C"/>
          <rect x="126" y="14" width="4" height="4" fill="#5CB85C"/>
        </g>
      </g>

    </svg>

    <div id="rename-overlay">
      <input id="rename-input" type="text" placeholder="Name your pet..." maxlength="20" />
    </div>
    <div id="bubble-wrap">
      <button id="bubble-close">&times;</button>
      <div id="speech-bubble"></div>
    </div>
    <div id="sub-agents"></div>
    <div id="status-bar">
      <span id="pet-name">Clawd</span>
      <span id="state-label">idle</span>
      <div id="food-bar"></div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
